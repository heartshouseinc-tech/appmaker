<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>AppMaker AI — アプリを作るアプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword,
  createUserWithEmailAndPassword, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, addDoc, getDocs,
  query, orderBy, limit, doc, deleteDoc, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey:"AIzaSyCVk2miG5TK1ffTofXLh0hHgeSbOvmIgZ8",
  authDomain:"kensetsu-nippo-842a2.firebaseapp.com",
  projectId:"kensetsu-nippo-842a2",
  storageBucket:"kensetsu-nippo-842a2.firebasestorage.app",
  messagingSenderId:"702880974315",
  appId:"1:702880974315:web:985321dc9180046629c5ae"
});
const auth = getAuth(app);
const db = getFirestore(app);
window.__fb = {
  auth, db, signInWithEmailAndPassword,
  createUserWithEmailAndPassword, signOut, onAuthStateChanged,
  collection, addDoc, getDocs, query, orderBy, limit, doc, deleteDoc,
  serverTimestamp
};
window.dispatchEvent(new Event('fb-ready'));
</script>

<style>
:root{
  --bg:#09090B;--bg2:#111113;--bg3:#18181B;
  --sur:#1C1C1F;--sur2:#222226;--sur3:#2A2A2F;
  --bor:rgba(255,255,255,.07);--bor2:rgba(255,255,255,.13);
  --txt:#FAFAFA;--txt2:#A1A1AA;--txt3:#52525B;
  --acc:#6366F1;--acc2:#818CF8;--acc3:rgba(99,102,241,.15);
  --grn:#10B981;--grn2:rgba(16,185,129,.15);
  --rose:#F43F5E;--rose2:rgba(244,63,94,.12);
  --gold:#F59E0B;--gold2:rgba(245,158,11,.12);
  --sh:0 4px 24px rgba(0,0,0,.4);
  --sh2:0 0 0 1px rgba(99,102,241,.3),0 4px 32px rgba(99,102,241,.2);
  --r1:6px;--r2:10px;--r3:16px;--r4:24px;--rf:9999px;
  --fd:'Bebas Neue',sans-serif;--fb:'Noto Sans JP',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--txt);
  font-family:var(--fb);-webkit-font-smoothing:antialiased;overflow:hidden}
button{border:none;cursor:pointer;font-family:var(--fb);
  -webkit-tap-highlight-color:transparent;outline:none}
input,textarea{font-family:var(--fb);outline:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--sur3);border-radius:2px}

/* ── SPLASH ── */
.splash{position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;z-index:300;transition:opacity .8s}
.splash.hide{opacity:0;pointer-events:none}
.sp-logo{font-family:var(--fd);font-size:3.8rem;letter-spacing:.18em;
  background:linear-gradient(135deg,#6366F1,#A78BFA,#10B981);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:.2rem}
.sp-sub{font-size:.6rem;letter-spacing:.3em;color:var(--txt3);
  text-transform:uppercase;margin-bottom:3rem}
.sp-bar{width:160px;height:2px;background:var(--sur3);
  border-radius:1px;overflow:hidden}
.sp-fill{height:100%;background:linear-gradient(90deg,#6366F1,#10B981);
  border-radius:1px;animation:spf 2s ease forwards}
@keyframes spf{from{width:0}to{width:100%}}

/* ── AUTH ── */
.auth-wrap{position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  z-index:200;padding:1.2rem;display:none}
.auth-card{background:var(--sur);border:1px solid var(--bor2);
  border-radius:var(--r4);padding:1.6rem 1.3rem;
  width:100%;max-width:360px;box-shadow:var(--sh)}
.auth-logo{font-family:var(--fd);font-size:1.8rem;letter-spacing:.15em;
  background:linear-gradient(135deg,#6366F1,#10B981);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-align:center;margin-bottom:.15rem}
.auth-tagline{font-size:.58rem;color:var(--txt3);text-align:center;
  letter-spacing:.12em;margin-bottom:1.4rem}
.auth-tabs{display:flex;background:var(--bg3);border-radius:var(--rf);
  padding:3px;margin-bottom:1rem}
.auth-tab{flex:1;padding:.4rem;border-radius:var(--rf);font-size:.7rem;
  font-weight:700;color:var(--txt3);background:transparent;transition:all .2s}
.auth-tab.on{background:var(--acc);color:#fff}
.auth-field{margin-bottom:.65rem}
.auth-label{font-size:.56rem;font-weight:700;letter-spacing:.06em;
  color:var(--txt3);text-transform:uppercase;margin-bottom:.22rem}
.auth-input{width:100%;padding:.58rem .72rem;border-radius:var(--r2);
  border:1.5px solid var(--bor2);background:var(--bg3);
  font-size:.76rem;color:var(--txt);transition:border .15s}
.auth-input:focus{border-color:var(--acc)}
.auth-btn{width:100%;padding:.75rem;border-radius:var(--rf);
  font-size:.8rem;font-weight:700;color:#fff;margin-top:.4rem;
  transition:opacity .15s;background:linear-gradient(135deg,var(--acc),#A78BFA)}
.auth-btn:active{opacity:.8}
.auth-err{font-size:.6rem;color:var(--rose);min-height:.85rem;margin:.25rem 0}

/* ── APP ── */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;
  position:relative;display:none}

/* ── TOP BAR ── */
.topbar{display:flex;align-items:center;padding:.45rem .85rem;
  background:var(--bg2);border-bottom:1px solid var(--bor);
  flex-shrink:0;gap:.5rem}
.topbar-logo{font-family:var(--fd);font-size:1.15rem;letter-spacing:.12em;
  background:linear-gradient(135deg,#6366F1,#10B981);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-beta{font-size:.48rem;font-weight:700;padding:.1rem .3rem;
  border-radius:3px;background:var(--acc3);color:var(--acc2);
  letter-spacing:.06em;align-self:flex-start;margin-top:.15rem}
.topbar-user{margin-left:auto;font-size:.6rem;color:var(--txt3)}
.topbar-logout{padding:.28rem .6rem;border-radius:var(--rf);
  border:1px solid var(--bor2);background:transparent;
  font-size:.58rem;color:var(--txt3);cursor:pointer}

/* ── MAIN ── */
.main{display:flex;flex:1;overflow:hidden}

/* ── LEFT PANEL ── */
.left{width:100%;display:flex;flex-direction:column;
  overflow:hidden;transition:all .3s}
.left.preview-open{display:none}

/* ── PROMPT AREA ── */
.prompt-wrap{padding:.75rem .85rem .5rem;flex-shrink:0}
.prompt-box{background:var(--sur);border:1.5px solid var(--bor2);
  border-radius:var(--r3);padding:.65rem .75rem;transition:border .2s;
  box-shadow:var(--sh)}
.prompt-box:focus-within{border-color:var(--acc);box-shadow:var(--sh2)}
.prompt-ta{width:100%;background:transparent;border:none;
  color:var(--txt);font-size:.8rem;resize:none;line-height:1.65;
  min-height:72px;max-height:140px}
.prompt-ta::placeholder{color:var(--txt3)}
.prompt-foot{display:flex;align-items:center;gap:.4rem;margin-top:.45rem;
  padding-top:.42rem;border-top:1px solid var(--bor)}
.gen-btn{flex:1;padding:.58rem;border-radius:var(--rf);
  background:linear-gradient(135deg,var(--acc),#A78BFA);
  font-size:.78rem;font-weight:700;color:#fff;
  display:flex;align-items:center;justify-content:center;gap:.35rem;
  transition:all .2s}
.gen-btn:disabled{opacity:.4}
.gen-btn.loading{animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:.7}50%{opacity:1}}
.improve-btn{padding:.58rem .7rem;border-radius:var(--rf);
  border:1.5px solid var(--bor2);background:var(--sur2);
  font-size:.7rem;font-weight:700;color:var(--txt2);
  display:flex;align-items:center;gap:.25rem}
.improve-btn:disabled{opacity:.3}

/* ── PRESETS ── */
.presets-hd{padding:.38rem .85rem .28rem;display:flex;
  align-items:center;justify-content:space-between;flex-shrink:0}
.presets-title{font-size:.6rem;font-weight:700;color:var(--txt3);
  letter-spacing:.08em;text-transform:uppercase}
.preset-cats{display:flex;gap:.28rem;padding:.28rem .85rem;
  overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.preset-cats::-webkit-scrollbar{display:none}
.pcat{padding:.26rem .6rem;border-radius:var(--rf);
  border:1.5px solid var(--bor);background:transparent;
  font-size:.6rem;font-weight:700;color:var(--txt3);
  cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.pcat.on{background:var(--acc3);border-color:var(--acc);color:var(--acc2)}
.presets-grid{display:grid;grid-template-columns:1fr 1fr;
  gap:.38rem;padding:.38rem .85rem;overflow-y:auto;flex:1}
.preset-card{background:var(--sur);border:1.5px solid var(--bor);
  border-radius:var(--r2);padding:.58rem .65rem;cursor:pointer;
  transition:all .15s}
.preset-card:active{transform:scale(.97)}
.preset-card:hover{border-color:var(--bor2);background:var(--sur2)}
.preset-ico{font-size:1.1rem;margin-bottom:.22rem}
.preset-name{font-size:.65rem;font-weight:700;color:var(--txt);
  margin-bottom:.08rem}
.preset-desc{font-size:.54rem;color:var(--txt3);line-height:1.5}

/* ── PREVIEW PANEL ── */
.right{flex:1;display:flex;flex-direction:column;
  background:var(--bg2);overflow:hidden;display:none}
.right.show{display:flex}
.preview-bar{display:flex;align-items:center;padding:.42rem .75rem;
  background:var(--bg3);border-bottom:1px solid var(--bor);
  flex-shrink:0;gap:.4rem}
.preview-title{font-size:.72rem;font-weight:700;color:var(--txt);flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.preview-desc{font-size:.6rem;color:var(--txt3);
  padding:.25rem .55rem .25rem .75rem;
  border-left:1px solid var(--bor);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:160px;display:none}
.pbar-btn{padding:.28rem .6rem;border-radius:var(--rf);
  border:1.5px solid var(--bor2);background:var(--sur3);
  font-size:.58rem;font-weight:700;color:var(--txt2);
  cursor:pointer;white-space:nowrap;flex-shrink:0}
.pbar-btn.accent{background:var(--acc3);border-color:var(--acc);
  color:var(--acc2)}
.preview-frame{flex:1;border:none;background:#fff;width:100%}
.preview-loading{display:none;flex:1;align-items:center;
  justify-content:center;flex-direction:column;gap:.6rem}
.preview-loading.show{display:flex}
.pload-dots{display:flex;gap:.4rem}
.pldot{width:8px;height:8px;border-radius:50%;
  background:var(--acc);animation:pld 1.2s infinite}
.pldot:nth-child(2){animation-delay:.15s;background:#A78BFA}
.pldot:nth-child(3){animation-delay:.3s;background:var(--grn)}
@keyframes pld{0%,60%,100%{transform:scale(1)}30%{transform:scale(1.6)}}
.pload-txt{font-size:.72rem;color:var(--txt3)}

/* ── HISTORY ── */
.hist-wrap{padding:.5rem .85rem;flex-shrink:0;display:none}
.hist-wrap.show{display:block}
.hist-title{font-size:.58rem;font-weight:700;color:var(--txt3);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:.38rem}
.hist-list{display:flex;gap:.35rem;overflow-x:auto;scrollbar-width:none}
.hist-list::-webkit-scrollbar{display:none}
.hist-item{flex-shrink:0;background:var(--sur);border:1.5px solid var(--bor);
  border-radius:var(--r2);padding:.42rem .6rem;cursor:pointer;
  transition:all .15s;max-width:140px}
.hist-item:hover{border-color:var(--bor2)}
.hist-item-name{font-size:.62rem;font-weight:700;color:var(--txt);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:.06rem}
.hist-item-time{font-size:.52rem;color:var(--txt3)}

/* ── MOBILE PREVIEW TOGGLE ── */
.mob-preview-btn{position:fixed;bottom:calc(.9rem + env(safe-area-inset-bottom));
  right:.9rem;z-index:100;padding:.65rem 1rem;border-radius:var(--rf);
  background:linear-gradient(135deg,var(--acc),#A78BFA);
  font-size:.72rem;font-weight:700;color:#fff;
  box-shadow:0 4px 20px rgba(99,102,241,.4);
  display:none;align-items:center;gap:.3rem}
.mob-preview-btn.show{display:flex}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(1.2rem + env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--sur3);border:1px solid var(--bor2);
  padding:.5rem 1rem;border-radius:var(--rf);font-size:.7rem;
  color:var(--txt);opacity:0;transition:all .3s;pointer-events:none;
  white-space:nowrap;z-index:500}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── FULL SCREEN PREVIEW (mobile) ── */
.fs-preview{position:fixed;inset:0;z-index:150;
  background:var(--bg2);flex-direction:column;display:none}
.fs-preview.show{display:flex}
.fs-bar{display:flex;align-items:center;padding:.5rem .8rem;
  background:var(--bg3);border-bottom:1px solid var(--bor);
  flex-shrink:0;gap:.4rem}
.fs-title{font-size:.72rem;font-weight:700;color:var(--txt);flex:1}
.fs-frame{flex:1;border:none;width:100%;background:#fff}
</style>
</head>
<body>

<!-- SPLASH -->
<div class="splash" id="splash">
  <div class="sp-logo">APPMAKER</div>
  <div class="sp-sub">AI × 日本語 × 世界一</div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
</div>

<!-- AUTH -->
<div class="auth-wrap" id="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">APPMAKER</div>
    <div class="auth-tagline">話しかけるだけでアプリが生まれる</div>
    <div class="auth-tabs">
      <button class="auth-tab on" id="atab-li" onclick="authTab('li')">ログイン</button>
      <button class="auth-tab" id="atab-reg" onclick="authTab('reg')">新規登録</button>

    <div id="aform-li">

      <div class="auth-err" id="li-err"></div>
      <button class="auth-btn" onclick="doLogin()">ログイン</button>
    </div>
    <div id="aform-reg" style="display:none">
      <div class="auth-field">
        <div class="auth-label">メールアドレス</div>
        <input class="auth-input" id="reg-email" type="email" placeholder="example@email.com">
      </div>
      <div class="auth-field">
        <div class="auth-label">仮パスワード（6文字以上）</div>
        <input class="auth-input" id="reg-pass" type="password" placeholder="パスワード">
      </div>
      <div class="auth-field">
        <div class="auth-label">確認</div>
        <input class="auth-input" id="reg-pass2" type="password" placeholder="もう一度">

      <button class="auth-btn" onclick="doRegister()"
        style="background:linear-gradient(135deg,var(--grn),#34D399)">

      </button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-logo">APPMAKER</div>
    <div class="topbar-beta" id="model-badge">AI BETA</div>
    <div class="topbar-user" id="topbar-user"></div>
    <button class="topbar-logout" onclick="doLogout()">ログアウト</button>
  </div>

  <div class="main">
    <!-- LEFT -->
    <div class="left" id="left-panel">
      <!-- PROMPT -->
      <div class="prompt-wrap">
        <div class="prompt-box">
          <textarea class="prompt-ta" id="prompt-ta" rows="3"
            placeholder="どんなアプリを作りますか？&#10;例：かわいいデザインのポモドーロタイマー&#10;例：家計簿アプリ（グラフ付き）&#10;例：RPG風の習慣管理アプリ"></textarea>
          <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.38rem">
          <label style="display:flex;align-items:center;gap:.3rem;cursor:pointer">
            <div id="ai-toggle" onclick="toggleAIMode()"
              style="width:36px;height:20px;border-radius:10px;background:var(--sur3);
              position:relative;transition:background .2s;cursor:pointer">
              <div id="ai-knob" style="width:16px;height:16px;border-radius:50%;
                background:#fff;position:absolute;top:2px;left:2px;
                transition:transform .2s"></div>
            </div>
            <span id="ai-mode-label" style="font-size:.62rem;font-weight:700;
              color:var(--txt3)">AI搭載モード OFF</span>
          </label>
          <div id="ai-mode-badge" style="display:none;font-size:.52rem;font-weight:700;
            padding:.1rem .38rem;border-radius:3px;
            background:rgba(16,185,129,.15);color:#10B981">
            Gemini 2.5 Flash 注入済み
          </div>
        </div>
        <div class="prompt-foot">
            <button class="gen-btn" id="gen-btn" onclick="generateApp()">
              ✨ アプリを生成
            </button>
            <button class="improve-btn" id="improve-btn"
              onclick="improveApp()" disabled title="生成後に改善できます">
              🔄 改善
            </button>
          </div>
        </div>
      </div>

      <!-- HISTORY -->
      <div class="hist-wrap" id="hist-wrap">
        <div class="hist-title">📁 最近の作品</div>
        <div class="hist-list" id="hist-list"></div>
      </div>

      <!-- PRESETS -->
      <div class="presets-hd">
        <div class="presets-title">⚡ プリセット30種</div>
      </div>
      <div class="preset-cats" id="preset-cats"></div>
      <div class="presets-grid" id="presets-grid"></div>
    </div>

    <!-- RIGHT (preview desktop) -->
    <div class="right" id="right-panel">
      <div class="preview-bar">
        <div class="preview-title" id="preview-title">プレビュー</div>
        <div class="preview-desc" id="preview-desc"></div>
        <button class="pbar-btn accent" onclick="downloadApp()">⬇ DL</button>
        <button class="pbar-btn" onclick="closePreview()">✕ 閉じる</button>
      </div>
      <div class="preview-loading" id="preview-loading">
        <div class="pload-dots">
          <div class="pldot"></div>
          <div class="pldot"></div>
          <div class="pldot"></div>
        </div>
        <div class="pload-txt" id="pload-txt">Gemini 2.5 Flashが生成中...</div>
      </div>
      <iframe class="preview-frame" id="preview-frame"

    </div>
  </div>
</div>

<!-- MOBILE PREVIEW BUTTON -->
<button class="mob-preview-btn" id="mob-btn" onclick="openMobilePreview()">
  👁 プレビュー
</button>

<!-- FULLSCREEN PREVIEW (mobile) -->
<div class="fs-preview" id="fs-preview">
  <div class="fs-bar">
    <div class="fs-title" id="fs-title">プレビュー</div>
    <button class="pbar-btn accent" onclick="downloadApp()" style="margin-left:auto">⬇ DL</button>
    <button class="pbar-btn" onclick="closeMobilePreview()">✕</button>
  </div>
  <iframe class="fs-frame" id="fs-frame"
    sandbox="allow-scripts allow-same-origin"></iframe>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
'use strict';

/* ══ 定数 ══ */
const FUNCTIONS_BASE = (location.hostname==='localhost'||location.hostname==='127.0.0.1')
  ? 'http://localhost:5001/kensetsu-nippo-842a2/us-central1'
  : 'https://us-central1-kensetsu-nippo-842a2.cloudfunctions.net';
const GEMINI_URL = FUNCTIONS_BASE + '/askAI';
const ACCESS_KEY = 'HeartsHouse2026Key';

/* ══ AIモデル設定 ══
   ここを変えるだけで全機能が最新モデルに切り替わる
   優先順位：
   1. Firestore config/ai（管理者がリモート更新）
   2. window.storageキャッシュ（前回取得値）
   3. このデフォルト値（フォールバック）
*/
const AI_CONFIG = {
  model: 'gemini-2.5-flash',
  maxTokens: 8000,
  version: '2.5',
};

async function loadAIConfig(){
  // window.storageキャッシュ確認（1時間有効）
  const cached = await WS.get('ai_config');
  if(cached && Date.now()-cached.ts < 3600000){
    AI_CONFIG.model = cached.model || AI_CONFIG.model;
    AI_CONFIG.maxTokens = cached.maxTokens || 8000;
    AI_CONFIG.version = cached.version || '2.5';
    return;
  }
  // Firestoreからリモート取得
  try{
    const {db,doc,getDoc} = window.__fb;
    const snap = await getDoc(doc(db,'config','ai'));
    if(snap.exists()){
      const d = snap.data();
      if(d.model) AI_CONFIG.model = d.model;
      if(d.maxTokens) AI_CONFIG.maxTokens = d.maxTokens;
      if(d.version) AI_CONFIG.version = d.version;
      await WS.set('ai_config',{...AI_CONFIG,ts:Date.now()});
    }
  }catch(e){
    // デフォルト値で継続
  }

function extractGeminiText(raw){
  const d = raw.data ? raw.data : raw;
  return d?.candidates?.[0]?.content?.parts?.[0]?.text
    || d?.text || '';
}

async function callGemini(system, user, maxTokens=null){
  maxTokens = maxTokens || AI_CONFIG.maxTokens;
  try{
    const r = await fetch(GEMINI_URL, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'X-Access-Key': ACCESS_KEY
      },
      body: JSON.stringify({
        model: AI_CONFIG.model,
        messages:[{role:'user', content: system+'\n\n'+user}],
        prompt: system+'\n\n'+user,
        max_tokens: maxTokens
      })
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const raw = await r.json();
    return extractGeminiText(raw) || '';
  }catch(e){ return ''; }
}

async function generateApp(){
  const prompt = document.getElementById('prompt-ta').value.trim();
  if(!prompt || isGenerating) return;
  isGenerating = true;
  currentPrompt = prompt;

  const genBtn = document.getElementById('gen-btn');
  genBtn.disabled = true;
  genBtn.textContent = '⏳ 生成中...';
  genBtn.classList.add('loading');

  showPreviewLoading('Gemini 2.5 Flashがコードを生成中...');

  const sysPrompt = aiModeOn
    ? SYSTEM_PROMPT + AI_SYSTEM_ADDITION
    : SYSTEM_PROMPT;
  const reply = await callGemini(sysPrompt, `ユーザーの要望: ${prompt}`, 8000);
  let appData = null;

  try{
    // JSON部分を抽出
    const jsonMatch = reply.match(/\{[\s\S]*"html_code"[\s\S]*\}/);
    if(jsonMatch){
      appData = JSON.parse(jsonMatch[0]);
    }
  }catch(e){
    // フォールバック：HTMLを直接抽出
    const htmlMatch = reply.match(/<!DOCTYPE html>[\s\S]*/i);
    if(htmlMatch){
      appData = {
        app_title: prompt.substring(0,20),
        app_description: 'AIが生成したアプリ',
        html_code: htmlMatch[0]
      };
    }
  }

  if(appData && appData.html_code){
    // AI搭載モードONなら生成HTMLにGemini関数を自動注入
    let finalHtml = appData.html_code;
    if(aiModeOn && finalHtml){
      finalHtml = finalHtml.replace('</head>', AI_INJECT_CODE + '</head>');
      if(!finalHtml.includes('AI_INJECT_CODE')){
        finalHtml = finalHtml.replace('</body>', AI_INJECT_CODE + '</body>');
      }
    }
    currentHtml = finalHtml;
    currentTitle = appData.app_title || prompt.substring(0,20);
    renderPreview(appData);
    saveHistory(appData, prompt);
    document.getElementById('improve-btn').disabled = false;
    showToast('✅ アプリが完成しました！');
  } else {
    hidePreviewLoading();
    showToast('❌ 生成に失敗しました。再度お試しください。');
  }

  genBtn.disabled = false;
  genBtn.textContent = '✨ アプリを生成';
  genBtn.classList.remove('loading');
  isGenerating = false;
}

    document.getElementById('mob-btn').classList.add('show');
    // ロード中は一時的にフルスクリーン表示
    const fs = document.getElementById('fs-preview');
    const fsFrame = document.getElementById('fs-frame');
    fs.classList.add('show');
    fsFrame.srcdoc = `<html><body style="background:#09090B;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;font-family:sans-serif">
      <div style="display:flex;gap:8px">
        <div style="width:10px;height:10px;border-radius:50%;background:#6366F1;animation:p 1.2s infinite"></div>
        <div style="width:10px;height:10px;border-radius:50%;background:#A78BFA;animation:p 1.2s .15s infinite"></div>
        <div style="width:10px;height:10px;border-radius:50%;background:#10B981;animation:p 1.2s .3s infinite"></div>
      </div>
      <div style="color:#52525B;font-size:13px">${txt}</div>
      <style>@keyframes p{0%,60%,100%{transform:scale(1)}30%{transform:scale(1.6)}}</style>
      </body></html>`;
  } else {
    // デスクトップ
    document.getElementById('right-panel').classList.add('show');
    document.getElementById('preview-loading').classList.add('show');
    document.getElementById('pload-txt').textContent = txt;
    document.getElementById('preview-frame').style.display='none';
    document.getElementById('left-panel').classList.add('preview-open');
  }
}

function hidePreviewLoading(){
  document.getElementById('preview-loading').classList.remove('show');
  document.getElementById('preview-frame').style.display='block';
}

function renderPreview(appData){
  // タイトル・説明更新
  document.getElementById('preview-title').textContent = appData.app_title||'生成されたアプリ';
  document.getElementById('fs-title').textContent = appData.app_title||'生成されたアプリ';
  const desc = document.getElementById('preview-desc');
  desc.textContent = appData.app_description||'';
  desc.style.display = 'block';

  const isMobile = window.innerWidth < 768;
  if(isMobile){
    const fsFrame = document.getElementById('fs-frame');
    fsFrame.srcdoc = appData.html_code;
  } else {
    hidePreviewLoading();
    const frame = document.getElementById('preview-frame');
    frame.style.display='block';
    frame.srcdoc = appData.html_code;
    document.getElementById('mob-btn').classList.add('show');
  }
}

function closePreview(){
  document.getElementById('right-panel').classList.remove('show');
  document.getElementById('left-panel').classList.remove('preview-open');
  document.getElementById('mob-btn').classList.remove('show');
}

function openMobilePreview(){
  if(!currentHtml){ showToast('まずアプリを生成してください'); return; }
  const fs = document.getElementById('fs-preview');
  const fsFrame = document.getElementById('fs-frame');
  document.getElementById('fs-title').textContent = currentTitle;
  fs.classList.add('show');
  fsFrame.srcdoc = currentHtml;
}

function closeMobilePreview(){
  document.getElementById('fs-preview').classList.remove('show');
}

/* ══ ダウンロード ══ */
function downloadApp(){
  if(!currentHtml){ showToast('まずアプリを生成してください'); return; }
  const blob = new Blob([currentHtml], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (currentTitle||'app').replace(/[^\w\u3000-\u9fff]/g,'_') + '.html';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('⬇ ダウンロード完了！');
}

/* ══ 履歴 ══ */
async function saveHistory(appData, prompt){
  const user = window.__fb?.auth?.currentUser;
  if(!user) return;
  const {db, collection, addDoc, serverTimestamp} = window.__fb;
  try{
    await addDoc(collection(db,'users',user.uid,'apps'),{
      title: appData.app_title||'無題',
      description: appData.app_description||'',
      html: appData.html_code,
      prompt: prompt,
      createdAt: serverTimestamp()
    });
    loadHistory();
  }catch(e){}
}

async function loadHistory(){
  const user = window.__fb?.auth?.currentUser;
  if(!user) return;
  const {db, collection, query, orderBy, limit, getDocs} = window.__fb;
  try{
    const q = query(
      collection(db,'users',user.uid,'apps'),
      orderBy('createdAt','desc'),
      limit(10)
    );
    const snap = await getDocs(q);
    const items = [];
    snap.forEach(d=>items.push({id:d.id,...d.data()}));
    renderHistory(items);
  }catch(e){}
}

function renderHistory(items){
  if(!items.length) return;
  const wrap = document.getElementById('hist-wrap');
  const list = document.getElementById('hist-list');
  wrap.classList.add('show');
  list.innerHTML = items.map(item=>`
    <div class="hist-item" onclick="loadHistoryItem(${JSON.stringify({
      title:item.title,
      description:item.description,
      html_code:item.html
    }).replace(/"/g,'&quot;')})">
      <div class="hist-item-name">${item.title}</div>
      <div class="hist-item-time">${item.prompt?.substring(0,20)||''}...</div>
    </div>`).join('');
}

function loadHistoryItem(dataStr){
  let appData;
  if(typeof dataStr === 'string'){
    try{ appData = JSON.parse(dataStr); }catch{ return; }
  } else {
    appData = dataStr;
  }
  let loadedHtml = appData.html_code;
  if(aiModeOn && loadedHtml){
    loadedHtml = loadedHtml.replace('</head>', AI_INJECT_CODE + '</head>');
  }
  currentHtml = loadedHtml;
  currentTitle = appData.title || appData.app_title || '作品';
  document.getElementById('preview-title').textContent = currentTitle;
  document.getElementById('fs-title').textContent = currentTitle;
  document.getElementById('improve-btn').disabled = false;
  if(window.innerWidth < 768){
    openMobilePreview();
  } else {
    document.getElementById('right-panel').classList.add('show');
    document.getElementById('left-panel').classList.add('preview-open');
    document.getElementById('preview-loading').classList.remove('show');
    const frame = document.getElementById('preview-frame');
    frame.style.display='block';
    frame.srcdoc = currentHtml;
  }
  document.getElementById('mob-btn').classList.add('show');
  showToast('📂 ' + currentTitle + ' を読み込みました');
}

/* ══ AUTH ══ */
function authTab(t){
  document.getElementById('aform-li').style.display=t==='li'?'block':'none';
  document.getElementById('aform-reg').style.display=t==='reg'?'block':'none';
  document.getElementById('atab-li').classList.toggle('on',t==='li');
  document.getElementById('atab-reg').classList.toggle('on',t==='reg');
}
async function doLogin(){
  const email=document.getElementById('li-email').value.trim();
  const pass=document.getElementById('li-pass').value;
  const err=document.getElementById('li-err');
  err.textContent='';
  if(!email||!pass){err.textContent='入力してください';return;}
  try{
    const {auth,signInWithEmailAndPassword}=window.__fb;
    await signInWithEmailAndPassword(auth,email,pass);
  }catch(e){err.textContent='メールまたはパスワードが違います';}
}
async function doRegister(){
  const email=document.getElementById('reg-email').value.trim();
  const pass=document.getElementById('reg-pass').value;
  const pass2=document.getElementById('reg-pass2').value;
  const err=document.getElementById('reg-err');
  err.textContent='';
  if(!email||!pass){err.textContent='全項目を入力してください';return;}
  if(pass.length<6){err.textContent='パスワードは6文字以上';return;}
  if(pass!==pass2){err.textContent='パスワードが一致しません';return;}
  try{
    const {auth,createUserWithEmailAndPassword}=window.__fb;
    await createUserWithEmailAndPassword(auth,email,pass);
  }catch(e){err.textContent='登録に失敗しました: '+e.message;}
}
async function doLogout(){
  await window.__fb.signOut(window.__fb.auth);
}

/* ══ TOAST ══ */
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

/* ══ 起動 ══ */
let _booted = false;
function bootApp(){
  if(_booted) return; _booted=true;
  setTimeout(()=>{
    document.getElementById('splash').classList.add('hide');
    if(!window.__fb || !window.__fb.auth){
      document.getElementById('auth-wrap').style.display='flex';
      return;
    }
    window.__fb.onAuthStateChanged(window.__fb.auth, user=>{
      if(user){
        document.getElementById('auth-wrap').style.display='none';
        document.getElementById('app').style.display='flex';
        initApp(user);
      } else {
        document.getElementById('auth-wrap').style.display='flex';
        document.getElementById('app').style.display='none';
      }
    });
  }, 2000);
}

/* ── Firebase準備待ち（確実版） ── */
function waitForFB(cb, maxWait=8000){
  if(window.__fb && window.__fb.auth){ cb(); return; }
  const start = Date.now();
  const timer = setInterval(()=>{
    if(window.__fb && window.__fb.auth){
      clearInterval(timer);
      cb();
    } else if(Date.now()-start > maxWait){
      clearInterval(timer);
      // 最終フォールバック：スプラッシュだけ消してauth画面を表示
      document.getElementById('splash').classList.add('hide');
      document.getElementById('auth-wrap').style.display='flex';
    }
  }, 100);
}

window.addEventListener('fb-ready', ()=> waitForFB(bootApp));
waitForFB(bootApp);
</script>
